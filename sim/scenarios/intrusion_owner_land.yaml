id: intrusion_owner_land
name: "Intrusion — owner land perimeter"
description: |
  Low-confidence anomaly detected at the east edge of a fenced ~1.2 ha
  rectangular perimeter. Single drone dispatched for sector verification,
  inspection, and live feed. Replicable on the founder site in Phase 19.
tick_hz: 10
# Phase 7.B — autonomy R1 fires on the 0.71 INTRUSION; deliberately
# stays under the R2 ESCALATE floor (0.80) so the operator owns
# escalation in this scenario.
autonomy_baseline: true
anchor:
  # Placeholder coords — Langhe vineyard, same as DEFAULT_DOCK in
  # sim/swarm_sim/world.py:20. Phase 19 swaps these for the founder site
  # coords (gitignored or env-overridden, never committed).
  lat: 44.7000
  lon: 8.0300
  alt_m: 0.0
plot:
  shape: rectangle
  width_m: 150.0
  height_m: 80.0
fleet:
  n_drones: 2
  dock_offset_m: { east: 0.0, north: 0.0 }
perception:
  territory_radius_m: 100.0
  # Phase 7.D — opt-in CV baseline. YOLOv8 pretrained runs on a committed
  # fixture frame per ignition; only `confidence` (below) is then replaced
  # by the real model score.
  cv_enabled: true
anomalies:
  # Evidence layer: onboard drone CV (RGB) raises this with a real YOLO
  # person label + score on the CV path (`cv_enabled: true`).
  - after_s: 15.0
    kind: INTRUSION
    position: { mode: offset_m, east: 75.0, north: 0.0 }
    confidence: 0.71
    source: drone_cv
