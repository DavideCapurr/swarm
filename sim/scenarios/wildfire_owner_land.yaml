id: wildfire_owner_land
name: "Wildfire — owner land"
description: |
  Low-confidence smoke detected on ~2 ha rectangular owner land; rises to
  verified fire 15 s later. Multi-drone perimeter containment scenario.
  Replicable on the founder site in Phase 19 by swapping anchor coords.
tick_hz: 10
# Phase 7.B — deterministic autonomy baseline (R1 auto-VERIFY on the
# 0.62 SMOKE; R2 auto-ESCALATE on the 0.88 FIRE follow-up).
autonomy_baseline: true
anchor:
  # Placeholder coords — Langhe vineyard, same as DEFAULT_DOCK in
  # sim/swarm_sim/world.py:20. Phase 19 swaps these for the founder site
  # coords (gitignored or env-overridden, never committed).
  lat: 44.7000
  lon: 8.0300
  alt_m: 0.0
plot:
  shape: rectangle
  width_m: 200.0
  height_m: 100.0
fleet:
  n_drones: 3
  dock_offset_m: { east: 0.0, north: 0.0 }
perception:
  territory_radius_m: 150.0
  # Phase 7.D — opt-in CV baseline. YOLOv8 pretrained runs on a committed
  # fixture frame per ignition; only `confidence` (below) is then replaced
  # by the real model score. The scripted YAML number stays the spec for
  # MockPerception (cv_enabled: false).
  # CV live (three-month plan): wildfire stays cv_enabled:false ON PURPOSE —
  # fire/smoke-CV is deferred to drone-day, NOT a sandbox workaround.
  # Rationale: the COCO yolov8n baseline carries no fire/smoke class, and the
  # fine-tuned `yolov8n-fire.pt` is still a drone_day placeholder (zero-pad
  # sha in manifest.json). Running COCO on a smoke frame would emit a
  # meaningless ~0 score — a fake value this repo refuses. So the SMOKE
  # anomaly keeps its honest scripted confidence (0.62) and the FIRE follow-up
  # is correctly `thermal_sat` (a satellite thermal signal, never an RGB/CV
  # detection). The deterministic R1→R2 path + the 0% shadow-divergence gate
  # both ride these scripted numbers. CV live is therefore proven on the two
  # `person`-class scenarios (intrusion + search), where COCO detection is
  # real; smoke-CV lands when the fine-tuned weight is pinned (drone-day).
  cv_enabled: false
anomalies:
  # Evidence layer: onboard drone CV spots smoke first (low confidence), then
  # a satellite thermal pass confirms a hot fire (+29 °C over the 18 °C
  # baseline) — the signal that drives the amber heat overlay on the map.
  # Every value is sim-modelled (`simulated: true` on the evidence).
  - after_s: 10.0
    kind: SMOKE
    position: { mode: offset_m, east: 40.0, north: 25.0 }
    confidence: 0.62
    source: drone_cv
  - after_s: 25.0
    kind: FIRE
    position: { mode: offset_m, east: 40.0, north: 25.0 }
    confidence: 0.88
    source: thermal_sat
    signal: { metric: temperature_c, value: 47.0, baseline: 18.0, unit: "°C" }
