# SWARM OS — Alembic configuration (Phase 4).
#
# - `script_location` points at the migrations package under the backend.
# - `sqlalchemy.url` is left blank: the actual URL is read from `DATABASE_URL`
#   inside `env.py`. Keeping it out of this file prevents credentials from
#   sneaking into the repo and lets the same migration set run against dev,
#   staging, and prod.

[alembic]
script_location = backend/app/db/migrations
prepend_sys_path = .
path_separator = os
sqlalchemy.url =
# Always recurse into versions/.
version_path_separator = os
# Use a stable revision id format so churn is obvious in diff review.
revision_environment = false
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
