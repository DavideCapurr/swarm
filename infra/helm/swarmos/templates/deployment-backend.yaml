apiVersion: apps/v1
kind: Deployment
metadata:
  name: swarmos-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "swarmos.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: swarmos
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "swarmos.labels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      annotations:
        # Roll on site config change.
        configmap.swarmos.io/site-hash: {{ include "swarmos.siteConfigHash" . | quote }}
    spec:
      serviceAccountName: swarmos-backend
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: {{ include "swarmos.image" (dict "img" .Values.image.backend) | quote }}
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - name: http
              containerPort: 8765
          env:
            - name: SWARM_ENV
              value: prod
            - name: SWARM_SITE_ID
              value: {{ .Values.siteId | quote }}
            - name: SWARM_SITES_DIR
              value: /etc/swarmos/sites
            - name: SWARM_OPERATORS_CONFIG
              value: /etc/swarmos/operators.yaml
            {{- if .Values.observability.metricsIPAllowlist }}
            - name: SWARM_METRICS_IP_ALLOWLIST
              value: {{ .Values.observability.metricsIPAllowlist | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: swarmos
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: site-config
              mountPath: /etc/swarmos/sites
              readOnly: true
            - name: operators
              mountPath: /etc/swarmos/operators.yaml
              subPath: operators.yaml
              readOnly: true
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 5
            failureThreshold: 30
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: site-config
          configMap:
            name: swarmos-site
        - name: operators
          secret:
            secretName: swarmos-operators
            items:
              - key: operators.yaml
                path: operators.yaml
            defaultMode: 0o400
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: swarmos-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "swarmos.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
automountServiceAccountToken: false
