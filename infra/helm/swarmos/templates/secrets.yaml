{{- /*
SwarmOS Secret stubs (Phase 6.E).

These templates render ONLY when `secrets.render=true` is explicitly set.
The default install path expects the operator to apply real Secret
manifests via sealed-secrets / External Secrets Operator / SOPS — the
chart should NEVER fold production credentials into Helm values.

The `render=true` switch is here for two narrow cases:
  1. `helm template ... | kubectl apply --dry-run=client` validation in
     CI, so the chart renders to a complete object graph without manual
     pre-steps.
  2. Single-node dev installs where the operator wants Helm to wire
     everything up end-to-end with throwaway dev values.
*/}}
{{- if .Values.secrets.render }}
apiVersion: v1
kind: Secret
metadata:
  name: swarmos
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "swarmos.labels" . | nindent 4 }}
type: Opaque
stringData:
  SWARM_JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
  SWARM_ALLOWED_ORIGINS: {{ .Values.secrets.allowedOrigins | quote }}
  SWARM_SITE_ID: {{ .Values.siteId | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: swarmos-operators
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "swarmos.labels" . | nindent 4 }}
type: Opaque
stringData:
  operators.yaml: |
    {{- .Values.secrets.operatorsYaml | nindent 4 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: swarmos-backup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "swarmos.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  BACKUP_GPG_RECIPIENT: {{ .Values.secrets.backupGpgRecipient | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: swarmos-backup-gnupg
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "swarmos.labels" . | nindent 4 }}
type: Opaque
data:
  # Empty by default — populate via ESO / sealed-secrets in production.
  pubring.kbx: ""
  trustdb.gpg: ""
{{- end }}
