# Let's Encrypt PROD ClusterIssuer (Phase 6.E).
#
# Production endpoint. Rate-limited (50 certs / domain / week), so don't
# point at this until the staging issuer has produced a healthy cert.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    # Bound at deploy time by the drone-day checklist (§2.E).
    email: REPLACE-ME-WITH-OPS-EMAIL@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
