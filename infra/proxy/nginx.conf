# SwarmOS production reverse proxy (Phase 6.E).
#
# Topology:
#   - HTTP :80   redirects everything to HTTPS, except
#                /.well-known/acme-challenge/ which serves from the shared
#                volume populated by the certbot sidecar (Let's Encrypt
#                HTTP-01 validation).
#   - HTTPS :443 terminates TLS and reverse-proxies to:
#         /api/  -> backend:8765 (FastAPI)
#         /ws/   -> backend:8765 (WebSocket upgrade preserved)
#         /      -> frontend:3000 (Next.js standalone server)
#
# Hardening:
#   - TLSv1.2 + TLSv1.3 only; modern cipher suite.
#   - HSTS with includeSubDomains + preload (matches backend security
#     middleware and frontend next.config security headers).
#   - OCSP stapling for revocation freshness.
#   - Security headers mirrored on every HTTPS response so static + API
#     answers carry the same posture (defense in depth — FastAPI already
#     emits them).
#   - X-Request-ID passed through to backend (request_id middleware
#     re-uses the incoming id when present; see backend/app/observability
#     /request_id.py).
#
# Cert files are written by the certbot sidecar into
# /etc/letsencrypt/live/${TLS_SERVER_NAME}/. The `TLS_MODE=self-signed`
# escape hatch (handled by the entrypoint script) lets developers boot
# compose-prod against a self-signed cert without going through ACME.

user nginx;
worker_processes auto;
worker_rlimit_nofile 8192;
# Pid file lives on a volume shared with the certbot sidecar so it can
# read the master pid and send SIGHUP after a successful renew.
pid /var/run/nginx/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── logging ─────────────────────────────────────────────────────────────
    log_format json escape=json
      '{'
        '"ts":"$time_iso8601",'
        '"remote":"$remote_addr",'
        '"method":"$request_method",'
        '"path":"$uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"referer":"$http_referer",'
        '"agent":"$http_user_agent",'
        '"request_id":"$sent_http_x_request_id",'
        '"upstream":"$upstream_addr",'
        '"upstream_ms":"$upstream_response_time"'
      '}';
    access_log /var/log/nginx/access.log json;
    error_log  /var/log/nginx/error.log warn;

    # ── core perf + safety ──────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    server_tokens off;
    client_max_body_size 1m;
    client_body_timeout 15s;
    client_header_timeout 15s;
    send_timeout 30s;
    types_hash_max_size 4096;

    # ── gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/wasm
        font/woff2
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # ── rate limiting ───────────────────────────────────────────────────────
    # Backend has its own per-IP / per-operator rate limit (Phase 1 + 6.C);
    # this is the first line of defense at the edge.
    limit_req_zone $binary_remote_addr zone=swarm_api:10m rate=20r/s;
    limit_req_status 429;

    # ── upstream pools ──────────────────────────────────────────────────────
    upstream swarm_backend {
        server backend:8765 max_fails=3 fail_timeout=15s;
        keepalive 32;
    }

    upstream swarm_frontend {
        server frontend:3000 max_fails=3 fail_timeout=15s;
        keepalive 32;
    }

    # ── HTTP -> HTTPS redirect, with ACME challenge passthrough ────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # ACME HTTP-01 challenge files written by the certbot sidecar.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ────────────────────────────────────────────────────────
    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Modern profile (Mozilla SSL Configurator, May 2026). Drop TLSv1.0
        # and v1.1 unconditionally.
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
        ssl_ecdh_curve X25519:secp384r1;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling. Disabled on self-signed mode (the entrypoint flips
        # the include below in that case).
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 1.0.0.1 valid=300s;
        resolver_timeout 5s;

        # ── security headers (parity with FastAPI middleware + next.config) ─
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;

        # ── request id passthrough ──────────────────────────────────────────
        # If the caller supplies X-Request-ID we forward it; otherwise the
        # backend mints a fresh uuid in its RequestIDMiddleware.
        proxy_set_header X-Request-ID $http_x_request_id;

        # ── backend REST ────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=swarm_api burst=40 nodelay;

            proxy_pass http://swarm_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 5s;
        }

        # ── backend WebSocket ───────────────────────────────────────────────
        location /ws/ {
            proxy_pass http://swarm_backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # WebSocket pings keep the link warm; the backend's auth /
            # bus consumer manages idle disconnects.
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── frontend ────────────────────────────────────────────────────────
        location / {
            proxy_pass http://swarm_frontend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
        }
    }
}
