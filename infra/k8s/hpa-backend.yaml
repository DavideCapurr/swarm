# SwarmOS backend HPA (Phase 6.E).
#
# Defaults: scale 2..10 on CPU utilisation 70%. Real thresholds get tuned
# against load tests in Phase 6.F (the roadmap explicitly defers
# performance work to that block).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: swarmos-backend
  namespace: swarmos
  labels:
    app.kubernetes.io/name: swarmos
    app.kubernetes.io/component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: swarmos-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
