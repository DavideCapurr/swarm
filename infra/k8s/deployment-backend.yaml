# SwarmOS backend Deployment (Phase 6.E).
#
# Hardening:
#   - PodSecurityContext: runAsNonRoot, runAsUser/Group 10001, fsGroup
#     10001, seccompProfile=RuntimeDefault.
#   - ContainerSecurityContext: readOnlyRootFilesystem,
#     allowPrivilegeEscalation=false, capabilities.drop=[ALL].
#   - emptyDir at /tmp because read-only rootfs forbids writes anywhere
#     else (request_id middleware, structlog rotation, uvicorn temp files).
#   - Liveness  -> /health (Phase 6.D wired)
#   - Readiness -> /ready  (Phase 6.D active probes for DB + Redis + auth)
#   - Startup   -> /health with a longer grace so cold-boot DB migrations
#     and bus consumer start-up don't trip the liveness check.
#
# Resource defaults are conservative (Phase 6.F will tune against real
# traffic). HPA in hpa-backend.yaml scales 2..10 on CPU.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: swarmos-backend
  namespace: swarmos
  labels:
    app.kubernetes.io/name: swarmos
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: swarmos
      app.kubernetes.io/component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0    # canary: never drop healthy pods during a roll
  template:
    metadata:
      labels:
        app.kubernetes.io/name: swarmos
        app.kubernetes.io/component: backend
      annotations:
        # Roll the Deployment whenever the site ConfigMap changes. The
        # rollout-controller annotation is computed by a kustomize patch
        # or `helm template` (the chart in infra/helm/ does this).
        configmap.swarmos.io/site-hash: "to-be-filled-by-tooling"
    spec:
      serviceAccountName: swarmos-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          # Image is overridden in Helm; raw manifest pins the dev tag for
          # `kubectl apply` smoke tests.
          image: ghcr.io/davidecapurr/swarmos-backend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8765
              protocol: TCP
          env:
            - name: SWARM_ENV
              value: prod
            - name: SWARM_SITES_DIR
              value: /etc/swarmos/sites
            - name: SWARM_OPERATORS_CONFIG
              value: /etc/swarmos/operators.yaml
          envFrom:
            - secretRef:
                name: swarmos
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: site-config
              mountPath: /etc/swarmos/sites
              readOnly: true
            - name: operators
              mountPath: /etc/swarmos/operators.yaml
              subPath: operators.yaml
              readOnly: true
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 5
            failureThreshold: 30   # 150 s total grace for migrations
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: site-config
          configMap:
            name: swarmos-site
        - name: operators
          secret:
            secretName: swarmos-operators
            items:
              - key: operators.yaml
                path: operators.yaml
            defaultMode: 0o400
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: swarmos-backend
  namespace: swarmos
  labels:
    app.kubernetes.io/name: swarmos
    app.kubernetes.io/component: backend
automountServiceAccountToken: false   # backend does not call the k8s API
