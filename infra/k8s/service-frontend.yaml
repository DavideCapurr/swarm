apiVersion: v1
kind: Service
metadata:
  name: swarmos-frontend
  namespace: swarmos
  labels:
    app.kubernetes.io/name: swarmos
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: swarmos
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
