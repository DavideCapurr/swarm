# SwarmOS secret — Phase 6.E (EXAMPLE ONLY).
#
# This file is checked into git as a TEMPLATE so operators can see every
# env var the backend expects. The real Secret must be provisioned via
# one of:
#   - sealed-secrets   (bitnami-labs/sealed-secrets)
#   - external-secrets (External Secrets Operator → cloud vault)
#   - kustomize secretGenerator with SOPS-encrypted values
#
# **Never** commit the real values. The .gitignore already blocks
# `infra/k8s/secret.yaml`; this template uses `.example.yaml` deliberately.
#
# Drone-day checklist §2.C documents JWT secret rotation and operator
# YAML provisioning; §2.E documents image-pull secret + cert-manager.
apiVersion: v1
kind: Secret
metadata:
  name: swarmos
  namespace: swarmos
  labels:
    app.kubernetes.io/name: swarmos
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Auth (Phase 6.C): ≥32 bytes random. Generate with `openssl rand -hex 32`.
  SWARM_JWT_SECRET: "REPLACE-ME-WITH-32-BYTE-HEX"
  # Persistence (Phase 4): asyncpg URL. Postgres user/pass come from the
  # postgres-credentials Secret; this URL is rendered at deploy time.
  DATABASE_URL: "postgresql+asyncpg://swarm:REPLACE-ME@postgres:5432/swarm"
  # Bus (Phase 5): rediss:// in prod. mTLS material is in a separate
  # Secret consumed by Redis itself.
  REDIS_URL: "rediss://:REPLACE-ME@redis:6379/0"
  # CORS allowlist — single origin in production.
  SWARM_ALLOWED_ORIGINS: "https://swarmos.example.com"
  # Observability — Prometheus scrape from the pod CIDR rather than via
  # bearer token. CIDR comes from the cluster operator (e.g. 10.42.0.0/16).
  SWARM_METRICS_IP_ALLOWLIST: ""
  # Site selection — referenced by Deployment.spec.env. Must match a key
  # under the swarmos-site ConfigMap.
  SWARM_SITE_ID: "vineyard-01"
---
# Operator YAML lives in a separate Secret (different rotation cadence
# than the JWT key). The file shape is documented in
# `infra/config/operators.example.yaml`.
apiVersion: v1
kind: Secret
metadata:
  name: swarmos-operators
  namespace: swarmos
  labels:
    app.kubernetes.io/name: swarmos
    app.kubernetes.io/component: operators
type: Opaque
stringData:
  operators.yaml: |
    # REPLACE WITH REAL OPERATOR ROSTER — see scripts/bootstrap_auth_dev.sh
    # for the shape. Production passwords go through
    # `python -m backend.app.auth.cli hash-password` first.
    operators: []
