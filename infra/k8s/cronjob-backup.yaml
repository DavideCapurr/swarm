# SwarmOS pg_dump backup CronJob (Phase 6.E).
#
# Schedule: every day at 02:17 UTC (avoid the cron-on-the-hour stampede
# that hits Postgres replication every site at the same minute).
# Retention: 30 days local; off-site sync is drone-day §2.E.
# Encryption: dumps are piped through `gpg --encrypt` to the public key
# imported via the swarmos-backup-gnupg Secret (operator-provisioned).
#
# Uses the bundled scripts/backup_postgres.sh script via a ConfigMap mount.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: swarmos-backup
  namespace: swarmos
  labels:
    app.kubernetes.io/name: swarmos
    app.kubernetes.io/component: backup
spec:
  schedule: "17 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 7
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: swarmos
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              # alpine:3.20 — backup-image-builder builds a hardened image
              # with pg_dump + gnupg + tini pre-installed. The image
              # built from infra/backup/Dockerfile is the supported path
              # for clusters that block network egress from CronJobs.
              image: ghcr.io/davidecapurr/swarmos-backup:dev
              imagePullPolicy: IfNotPresent
              env:
                - name: BACKUP_DIR
                  value: /backups
                - name: BACKUP_RETENTION_DAYS
                  value: "30"
              envFrom:
                - secretRef:
                    name: swarmos-backup
              volumeMounts:
                - name: backups
                  mountPath: /backups
                - name: gnupg
                  mountPath: /home/swarm/.gnupg
                  readOnly: true
                - name: script
                  mountPath: /usr/local/bin/backup_postgres.sh
                  subPath: backup_postgres.sh
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              command: ["/usr/local/bin/backup_postgres.sh"]
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 10001
                runAsGroup: 10001
                capabilities:
                  drop: [ALL]
                seccompProfile:
                  type: RuntimeDefault
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: swarmos-backups
            - name: gnupg
              secret:
                secretName: swarmos-backup-gnupg
                defaultMode: 0o400
            - name: script
              configMap:
                name: swarmos-backup-script
                defaultMode: 0o555
            - name: tmp
              emptyDir:
                sizeLimit: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: swarmos-backups
  namespace: swarmos
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 50Gi
---
# Backup credentials. DATABASE_URL is reused from the main swarmos Secret;
# this Secret only holds the GPG recipient identity (drone-day §2.E binds
# the off-site destination).
apiVersion: v1
kind: Secret
metadata:
  name: swarmos-backup
  namespace: swarmos
type: Opaque
stringData:
  DATABASE_URL: "postgresql://swarm:REPLACE-ME@postgres:5432/swarm"
  BACKUP_GPG_RECIPIENT: "REPLACE-ME-WITH-GPG-FINGERPRINT"
---
# GPG home with the backup recipient public key imported. Provisioned by
# the operator: `gpg --homedir tmp --import backup-pub.asc &&
# kubectl create secret generic swarmos-backup-gnupg
#     --from-file=tmp/pubring.kbx --from-file=tmp/trustdb.gpg ...`.
apiVersion: v1
kind: Secret
metadata:
  name: swarmos-backup-gnupg
  namespace: swarmos
type: Opaque
data:
  # Populate at deploy time. Empty value is intentional in the example.
  pubring.kbx: ""
  trustdb.gpg: ""
---
# Backup script ConfigMap (same script as scripts/backup_postgres.sh).
# The chart syncs this from the file on disk at template time.
apiVersion: v1
kind: ConfigMap
metadata:
  name: swarmos-backup-script
  namespace: swarmos
data:
  # The Helm chart embeds the live script content; this raw manifest
  # keeps a stub here so `kubectl apply -f infra/k8s/` works
  # standalone with operator-provisioned content.
  backup_postgres.sh: |
    #!/bin/sh
    echo "Populate from scripts/backup_postgres.sh at deploy time."
    exit 1
