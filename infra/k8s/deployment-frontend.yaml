# SwarmOS frontend Deployment (Phase 6.E).
#
# Next.js standalone server. The image carries only `.next/standalone`,
# `.next/static`, and `public/` (frontend/Dockerfile multi-stage).
# Same hardening posture as backend: non-root, ro-rootfs, drop ALL caps.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: swarmos-frontend
  namespace: swarmos
  labels:
    app.kubernetes.io/name: swarmos
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: swarmos
      app.kubernetes.io/component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: swarmos
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: swarmos-frontend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: ghcr.io/davidecapurr/swarmos-frontend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: SWARM_ENV
              value: prod
            # Public endpoints are rendered by Helm at deploy time
            # against the ingress hostname (values.ingress.host).
            - name: NEXT_PUBLIC_API_URL
              value: https://swarmos.example.com/api
            - name: NEXT_PUBLIC_WS_URL
              value: wss://swarmos.example.com/ws/telemetry
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 32Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: swarmos-frontend
  namespace: swarmos
  labels:
    app.kubernetes.io/name: swarmos
    app.kubernetes.io/component: frontend
automountServiceAccountToken: false
