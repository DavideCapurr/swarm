# Dependabot config for SwarmOS.
#
# Weekly cadence to keep noise low; minor + patch updates grouped to a single
# PR per ecosystem. Major bumps still land as individual PRs so they can be
# reviewed in isolation.
version: 2

updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "python"
    groups:
      python-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # GitHub's Dependabot API still names the JavaScript ecosystem "npm",
  # even when the project uses pnpm and pnpm-lock.yaml.
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "frontend"
    groups:
      frontend-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - "deps"
      - "ci"
    groups:
      actions-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - "deps"
      - "docker"
