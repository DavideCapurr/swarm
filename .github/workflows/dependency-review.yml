name: dependency-review

on:
  pull_request:

permissions:
  contents: read
  # Required by dependency-review-action to comment on the PR.
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # actions/dependency-review-action@v4.3.1
      - uses: actions/dependency-review-action@e58c696e52cac8e62d61cc21fda89565d71505d7
        with:
          fail-on-severity: high
          # Block any GPL-3.0 or AGPL-3.0 dependencies (we ship a closed source
          # product). Add more here as the legal review evolves.
          deny-licenses: AGPL-1.0, AGPL-3.0, GPL-2.0, GPL-3.0
          comment-summary-in-pr: on-failure
