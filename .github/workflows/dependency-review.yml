name: dependency-review

on:
  pull_request:

permissions:
  contents: read
  # Required by dependency-review-action to comment on the PR.
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # actions/dependency-review-action@v4.3.1
      # Phase 0 posture: severity gate only. License deny-list will be added
      # in Phase 6 after legal review of the dep tree (likely deny AGPL/GPL
      # for shipped code; allow them for build-only tools).
      - uses: actions/dependency-review-action@e58c696e52cac8e62d61cc21fda89565d71505d7
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
