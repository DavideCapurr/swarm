name: lint

on:
  push:
    branches: ["**"]
  pull_request:

# S5: GITHUB_TOKEN least-privilege. Lint workflow only needs to clone the
# repo; no write to issues, packages, or anything else.
permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # S4: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # S4: actions/setup-python@v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      # astral-sh/setup-uv@v8.1.0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install lint deps
        run: uv sync --frozen --extra dev --extra mavlink --extra dji
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy core adapters orchestrator sim backend

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      # S4: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # S4: actions/setup-node@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: frontend/.nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Enable pnpm through Corepack
        run: corepack enable
      # S3: install with lifecycle scripts disabled (driven by .pnpmrc), then
      # gate explicitly on `high`-or-above CVEs. Running audit twice with
      # different thresholds produces confusing exit codes; this separates
      # "install succeeded" from "no known high CVEs".
      - name: Install deps (pnpm, ignore-scripts honored from .pnpmrc)
        run: corepack pnpm install --frozen-lockfile --ignore-scripts
      - name: pnpm audit (fail on high)
        run: corepack pnpm audit --audit-level=high
      - name: ESLint
        run: corepack pnpm lint
