name: test

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel an in-progress run when a newer commit lands on the same ref
# (PR or branch). Halves runner minutes on fast push cycles without
# changing coverage — the newest commit's run still completes.
concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # S4: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # S4: actions/setup-python@v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      # astral-sh/setup-uv@v8.1.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install Python deps
        run: uv sync --frozen --extra dev --extra mavlink --extra dji
      - name: pip-audit
        run: uv run pip-audit --skip-editable --cache-dir .cache/pip-audit
      - name: Run pytest with coverage gate
        # Phase 6.J — backend ≥80% gate. Load + chaos samples are
        # deselected here because the coverage instrumentation breaks
        # their latency SLO; they run in the load-smoke job (no cov)
        # and in the chaos-test workflow respectively.
        run: |
          uv run pytest -q -m "not load_smoke and not chaos" \
            --cov=core --cov=adapters --cov=orchestrator --cov=swarm_os --cov=backend \
            --cov-report=term-missing --cov-fail-under=80

  load-smoke:
    # Phase 6.F — in-process p95 assertions. Cheap (≤ 15 s wall) and
    # runs on every push so a regression in WS/REST fanout latency
    # fails the PR. The soak (500 msg/s × 5 min) lives in
    # `.github/workflows/load-test.yml` (weekly).
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: python
    steps:
      # S4: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # S4: actions/setup-python@v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      # astral-sh/setup-uv@v8.1.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install Python deps
        run: uv sync --frozen --extra dev --extra mavlink --extra dji
      - name: Run load smoke
        run: uv run pytest tests/load -m load_smoke -q

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      # S4: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # S4: actions/setup-node@v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: frontend/.nvmrc
      - name: Enable pnpm through Corepack
        run: |
          corepack enable
          corepack prepare pnpm@11.1.2 --activate
      - name: Install deps (ignore-scripts honored from .npmrc)
        run: corepack pnpm install --frozen-lockfile --ignore-scripts
      - name: pnpm audit (fail on high)
        run: corepack pnpm audit --audit-level=high
      - name: Type check
        run: corepack pnpm typecheck
      - name: Vitest (critical-path coverage, Phase 6.J)
        run: corepack pnpm test
