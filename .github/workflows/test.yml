name: test

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # S4: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # S4: actions/setup-python@v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pip-audit
        # Soft-fail on transitive issues we can't immediately fix, but log
        # them — Dependabot still tracks them.
        run: |
          pip install pip-audit
          pip-audit --strict --ignore-vuln PYSEC-2025-0000 || true
      - name: Run pytest
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      # S4: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # S4: actions/setup-node@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps (ignore-scripts honored from .npmrc)
        run: npm ci --no-audit --no-fund
      - name: npm audit (fail on high)
        run: npm audit --audit-level=high
      - name: Type check
        run: npm run typecheck
