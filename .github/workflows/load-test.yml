name: load-test

# Phase 6.F — weekly soak.
#
# Spins a real Postgres + Redis as service containers, boots the backend,
# bootstraps the dev operator store, then runs the out-of-process driver
# at 500 msg/s for 5 min. Exits non-zero on any SLO breach (WS p95 > 200
# ms, REST p95 > 100 ms, REST 5xx > 0) and uploads the results JSON for
# triage. Schedule sits at Mon 04:17 UTC so it's off-window from the
# daily image-scan workflow (11:03 UTC).

on:
  schedule:
    # Mon 04:17 UTC — quiet window, no overlap with image-scan / codeql.
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  soak:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      # Same digest-pinned images as `docker-compose.yml` so the soak
      # exercises the production-shape persistence path (Timescale +
      # Redis), not a stripped-down stock Postgres.
      postgres:
        image: timescale/timescaledb@sha256:51eb3bcdfc41f481c797026813d9d457fb5cbc8ea370a65640d8cda13a4040c1
        env:
          POSTGRES_USER: swarm
          POSTGRES_PASSWORD: swarm
          POSTGRES_DB: swarm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U swarm"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
      redis:
        image: redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      DATABASE_URL: postgresql+asyncpg://swarm:swarm@localhost:5432/swarm
      REDIS_URL: redis://localhost:6379/0
      SWARM_ENV: dev
      SWARM_AUTH_DISABLED: "0"
    steps:
      # S4: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # S4: actions/setup-python@v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      # astral-sh/setup-uv@v8.1.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python deps
        run: uv sync --frozen --extra dev --extra mavlink --extra dji

      - name: Bootstrap auth (dev operator + JWT secret)
        run: |
          # `bootstrap-auth-dev` is idempotent; it writes the JWT secret to
          # .env and creates infra/config/operators.yaml with three local
          # accounts. The soak driver authenticates as op-operator01.
          ./scripts/bootstrap_auth_dev.sh
          set -a
          . ./.env
          set +a
          echo "SWARM_JWT_SECRET=${SWARM_JWT_SECRET}" >> "$GITHUB_ENV"

      - name: Apply DB migrations
        run: uv run alembic upgrade head

      - name: Start backend (background)
        run: |
          mkdir -p artifacts
          nohup uv run uvicorn backend.app.main:app \
            --host 127.0.0.1 --port 8765 \
            > artifacts/backend.log 2>&1 &
          echo $! > artifacts/backend.pid

      - name: Wait for /ready
        run: |
          for i in $(seq 1 60); do
            if curl -fsS --max-time 1 http://127.0.0.1:8765/ready >/dev/null; then
              echo "ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "backend never became ready" >&2
          cat artifacts/backend.log >&2 || true
          exit 1

      - name: Run soak (500 msg/s x 5 min)
        env:
          SWARM_LOAD_USER: op-operator01
          SWARM_LOAD_PASSWORD: swarm-dev
        run: |
          mkdir -p tests/load/results
          uv run python -m tests.load.driver \
            --rate 500 \
            --duration 300 \
            --agents 50 \
            --ws-clients 4 \
            --rest-concurrency 8 \
            --results tests/load/results/last.json

      - name: Stop backend
        if: always()
        run: |
          if [ -f artifacts/backend.pid ]; then
            kill -TERM "$(cat artifacts/backend.pid)" || true
          fi

      - name: Upload artifacts
        if: always()
        # S4: actions/upload-artifact@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: load-test-artifacts
          path: |
            tests/load/results/last.json
            artifacts/backend.log
          retention-days: 30
