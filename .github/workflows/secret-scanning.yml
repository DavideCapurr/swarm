name: secret-scanning

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          # Gitleaks needs the full history to inspect blob shas.
          fetch-depth: 0

      # Run the gitleaks CLI directly instead of gitleaks-action — the action
      # historically requires GITLEAKS_LICENSE for organization repos and has
      # had release breakage. The standalone binary has neither concern.
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan repo history
        run: |
          gitleaks detect \
            --source . \
            --verbose \
            --redact \
            --exit-code 1 \
            --no-banner
