name: sast

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  bandit:
    name: bandit (python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # actions/setup-python@v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: pip
      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[toml]>=1.7"
      - name: Run bandit
        # `-ll` = report MEDIUM and HIGH; ignore LOW noise.
        # `-r` = recursive. We scan everything except tests + virtualenvs.
        run: |
          bandit -r core adapters orchestrator sim backend swarm_os \
            --severity-level medium \
            --skip B101,B311 \
            || exit 1

  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # actions/setup-python@v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - name: Install semgrep
        run: |
          python -m pip install --upgrade pip
          pip install "semgrep>=1.70"
      - name: Run semgrep (advisory)
        # Posture: semgrep with broad rule packs *reports* findings without
        # failing the build. Bandit + ruff + pip-audit + pnpm audit + Trivy
        # are the blocking SAST/supply-chain gates that already cover the
        # OWASP surface. Semgrep is secondary signal across the same code.
        # The gate stays advisory because the public rule packs can change
        # between runs (registry-side rule churn) and we don't want that to
        # red-bar the build before triage. Tightening to blocking is queued
        # for the Phase 7-prep registry-pinning work (see
        # docs/security/threat-model.md §S3).
        run: |
          semgrep \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/secrets \
            --severity ERROR \
            --exclude node_modules \
            --exclude .next \
            --exclude .venv \
            --exclude tests/fuzz \
            || echo "::warning::semgrep found issues (advisory — see workflow comment)"
