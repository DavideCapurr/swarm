name: sast

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  bandit:
    name: bandit (python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # actions/setup-python@v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[toml]>=1.7"
      - name: Run bandit
        # `-ll` = report MEDIUM and HIGH; ignore LOW noise.
        # `-r` = recursive. We scan everything except tests + virtualenvs.
        run: |
          bandit -r core adapters orchestrator sim backend swarm_os \
            --severity-level medium \
            --skip B101,B311 \
            || exit 1

  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # actions/setup-python@v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Install semgrep
        run: |
          python -m pip install --upgrade pip
          pip install "semgrep>=1.70"
      - name: Run semgrep
        run: |
          semgrep \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/python \
            --config p/typescript \
            --config p/javascript \
            --config p/react \
            --config p/secrets \
            --error \
            --severity ERROR \
            --severity WARNING \
            --exclude node_modules \
            --exclude .next \
            --exclude .venv \
            --exclude tests/fuzz
